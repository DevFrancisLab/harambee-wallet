<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1D4ED8" />
    <title>Harambee Wallet — Raise Together. Help Faster.</title>
    <meta name="description" content="Harambee Wallet — Transparent community fundraising platform. Raise together, help faster." />
    <!-- Use existing placeholder.svg as favicon in dev to avoid 404 when favicon.ico is missing -->
    <link rel="icon" href="/placeholder.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/placeholder.svg" />

    <meta property="og:title" content="Harambee Wallet" />
    <meta property="og:description" content="Transparent community fundraising platform" />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <!-- Ensure Buffer is available for deps that expect Node Buffer (e.g. bitcoinjs-lib) -->
    <!-- use wildcard import because the package uses CommonJS exports and may not provide a named export -->
    <script type="module">
      import * as buf from '/node_modules/buffer/index.js';
      // buffer module exports Buffer on the object
      const B = buf.Buffer || buf.default || buf;
      if (!globalThis.Buffer) globalThis.Buffer = B;
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
